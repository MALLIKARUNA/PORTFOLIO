<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Contact | Mallikarjun Alyal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #a1a3eb, #bd64ed);
        }

        .nav-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px 0;
            background-color: #031949;
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-size: 18px;
        }

        .nav-links a:hover {
            color: #38bdf8;
        }

        .nav-image {
            position: absolute;
            right: 60px;
        }

        .nav-image img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
        }

        .content {
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #2d2d2d;
        }

        .content h1 {
            font-size: 40px;
            margin-bottom: 30px;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 400px;
            gap: 15px;
        }

        .contact-form input,
        .contact-form textarea {
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        .contact-form button {
            padding: 12px;
            background-color: #031949;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        .contact-form button:hover {
            background-color: #38bdf8;
        }
    </style>

</head>

<body>

    <nav class="nav-bar">
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="skill.html">Skill</a>
            <a href="project.html">Project</a>
            <a href="contact.html">Contact</a>
        </div>

        <div class="nav-image">
            <img src="photo.jpeg" alt="Mallikarjun Alyal">
        </div>
    </nav>

    <section class="content">
        <h1>Contact Me</h1>

        <form class="contact-form" id="contactForm">

            <input type="text" placeholder="Your Name" required>

            <input type="email" placeholder="Your Email" required>

            <input type="tel" placeholder="Your Phone Number" pattern="[0-9]{10}" required>

            <textarea placeholder="Your Message" rows="4" required></textarea>

            <button type="submit">Send Message</button>

        </form>
    </section>

    <script>

        document.getElementById("contactForm").addEventListener("submit", function (event) {

            if (!this.checkValidity()) {
                return;
            }

            alert("Message sent successfully!");

        });

    </script>

</body>

</html>
